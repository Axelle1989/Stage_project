    <main class="container mx-auto p-6 flex justify-center">
      <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center">Achat de ciment</h1>
        <form onsubmit="return validateForm()" action="envoi.html" method="post">
          <div class="mb-4">
            <label class="block text-blue-700 text-sm font-bold mb-2" for="nom">
              Nom
            </label>
            <input
            class="shadow border rounded w-full py-2 px-3 text-gray-600 focus:outline-none"
            id="nom"
            type="text"
            placeholder="Ex: TOUFICK"
            required
            />
          </div>
          <div class="mb-4">
            <label class="block text-blue-700 text-sm font-bold mb-2" for="prenom">
              Prenom
            </label>
            <input
            class="shadow border rounded w-full py-2 px-3 text-gray-600 focus:outline-none"
            id="Prenom"
            type="text"
            placeholder="Ex: Alexis"
            required
            />
          </div>
          <div class="mb-4">
            <label class="block text-blue-700 text-sm font-bold mb-2" for="email">
              Email
            </label>
            <input
            class="shadow border rounder w-full py-2 px-3 text-gray-600 focus:outline-none"
            id="email"
            type="email"
            placeholder="Ex: alexis.bedo@gmail.com"
            required
            />
          </div>
          <div class="mb-4">
            <label class="block text-blue-700 text-sm font-bold mb-2" for="telephone">
              Téléphone
            </label>
            <input
            class="shadow border rounded w-full py-2 px-3 text-gray-600 focus:outline-none"
            id="telephone"
            type="tel"
            placeholder="Ex: +229 01 40 44 27 18"
            required
            />
          </div>
          <div class="mb-4">
            <label class="block text-blue-700 text-sm font-bold mb-2" for="quantite">
              Nombres de sacs
            </label>
            <input
            class="shadow border rounded w-full py-2 px-3 text-gray-600 focus:outline-none"
            id="quantite"
            type="number"
            min="1"
            placeholder="Ex: 1"
            required
            />
          </div>
          <div class="mb-4">
            <label class="block text-blue-700 text-sm font-bold mb-2" for="qualité">
              Catégorie de ciment
            </label>
            <select 
            class="shadow border rounded w-full py-2 px-3 text-gray-700 focus:outline-none"
            id="qualite"
            required
            >
            <option value="">Sélectionner une catégorie</option>
            <option value="">option 1</option>
            <option value="">option 2</option>
            <option value="">option 3</option>
           </select>
          </div>
          <div class="flex items-center justify-between">
            <button
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none"
            type="submit"
            >
            Commander
          </button>
        </div>
      </from>
    </div>
